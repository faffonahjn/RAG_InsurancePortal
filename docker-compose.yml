version: "3.8"

services:
  api:
    build: .
    container_name: rag-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./vectorstore:/app/vectorstore
    env_file:
      - .env
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000

  ui:
    build: .
    container_name: rag-ui
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./vectorstore:/app/vectorstore
    env_file:
      - .env
    command: streamlit run app/streamlit_app.py --server.address 0.0.0.0
    depends_on:
      - api